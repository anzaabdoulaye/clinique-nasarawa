security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\Utilisateur
                property: username

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                success_handler: App\Security\LoginSuccessHandler
            logout:
                path: app_logout

    access_control:
        - { path: ^/login$, roles: PUBLIC_ACCESS }
        - { path: ^/logout$, roles: PUBLIC_ACCESS }

        # changement obligatoire du mot de passe après première connexion
        - { path: ^/utilisateur/change-password$, roles: IS_AUTHENTICATED_FULLY }

        # administration
        - { path: ^/utilisateur, roles: ROLE_ADMIN }
        - { path: ^/service/medical, roles: ROLE_ADMIN }

        # patient
        - { path: ^/patient, roles: [ROLE_ADMIN, ROLE_ACCUEIL, ROLE_MEDECIN, ROLE_INFIRMIER] }

        # rendez-vous
        - { path: ^/rendez/vous, roles: [ROLE_ADMIN, ROLE_ACCUEIL, ROLE_MEDECIN] }

        # consultation
        - { path: ^/consultation, roles: [ROLE_ADMIN, ROLE_ACCUEIL, ROLE_MEDECIN, ROLE_INFIRMIER] }

        # prescription / prestations rattachées à la consultation
        - { path: ^/prescription, roles: [ROLE_ADMIN, ROLE_ACCUEIL, ROLE_MEDECIN] }
        - { path: ^/prescription-prestation, roles: [ROLE_ADMIN, ROLE_ACCUEIL, ROLE_MEDECIN] }


        # clinique
        - { path: ^/patient, roles: [ROLE_ADMIN, ROLE_ACCUEIL, ROLE_MEDECIN, ROLE_INFIRMIER] }
        - { path: ^/rendez/vous, roles: [ROLE_ADMIN, ROLE_ACCUEIL, ROLE_MEDECIN] }
        - { path: ^/consultation, roles: [ROLE_ADMIN, ROLE_ACCUEIL, ROLE_MEDECIN, ROLE_INFIRMIER] }

        # factures
        - { path: ^/facture, roles: [ROLE_ADMIN, ROLE_ACCUEIL, ROLE_PERCEPTION, ROLE_MEDECIN] }

        # perception
        - { path: ^/perception, roles: [ROLE_ADMIN, ROLE_PERCEPTION] }

        # laboratoire
        - { path: ^/laboratoire, roles: [ROLE_ADMIN, ROLE_LABO, ROLE_MEDECIN] }

            # pharmacie
        - { path: ^/pharmacie, roles: [ROLE_ADMIN, ROLE_PHARMACIE] }
        - { path: ^/medicament, roles: [ROLE_ADMIN, ROLE_PHARMACIE] }
        - { path: ^/lot, roles: [ROLE_ADMIN, ROLE_PHARMACIE] }
        - { path: ^/vente, roles: [ROLE_ADMIN, ROLE_PHARMACIE] }

        # hospitalisation
        - { path: ^/hospitalisation, roles: [ROLE_ADMIN, ROLE_HOSPITALISATION, ROLE_MEDECIN, ROLE_INFIRMIER] }

        # comptabilité matière
        - { path: ^/comptabilite-matiere, roles: [ROLE_ADMIN, ROLE_COMPTA_MATIERE] }
        - { path: ^/inventaire, roles: [ROLE_ADMIN, ROLE_COMPTA_MATIERE] }

        # le reste doit être authentifié
        - { path: ^/, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10